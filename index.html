<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎁 Сюрприз | Электронная открытка</title>
    
    <!-- Подключаем библиотеку -->
    <script src="https://cdn.jsdelivr.net/npm/add-to-calendar-button@2" async defer></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(145deg, #f5f0ff 0%, #e8e0ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 40px 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #7c3aed, #c026d3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .photo {
            margin: 24px 0;
            border-radius: 28px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            background: #f3e8ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-placeholder {
            font-size: 5rem;
            background: #ede9fe;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .message {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #1f2937;
            margin: 24px 0 20px;
        }
        add-to-calendar-button {
            --btn-background: #7c3aed;
            --btn-background-hover: #6d28d9;
            --btn-text: white;
            --btn-font-size: 1rem;
            --btn-padding: 14px 28px;
            --btn-border-radius: 60px;
            --btn-box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
            --btn-font-weight: 600;
        }
        .countdown {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: monospace;
            background: #f5f3ff;
            padding: 16px;
            border-radius: 60px;
            color: #6d28d9;
            margin-top: 20px;
        }
        .qr-hint {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ Сюрприз для тебя ✨</h1>
        
        <div class="photo">
            <img src="your-photo.jpg" alt="Наше фото" id="eventPhoto">
            <div class="photo-placeholder" id="photoPlaceholder">🎁📸</div>
        </div>
        
        <div class="message">
            💫 Дорогой друг!<br>
            У меня для тебя кое-что особенное.<br>
            Сохрани дату в календарь — не пропусти!
        </div>
        
        <!-- ⚡ ГЛАВНОЕ: options="['Apple','Google','iCal']" -->
        <add-to-calendar-button
            name="🥳 Наше событие"
            description="Сюрприз ждёт! Приходи, будет классно ✨"
            startDate="2026-06-15"
            startTime="18:00"
            endTime="21:00"
            location="Скажу позже 😉"
            options="['Apple','Google','iCal']"
            timeZone="Europe/Moscow"
            trigger="click"
            label="📅 Добавить в календарь"
        ></add-to-calendar-button>
        
        <div class="countdown" id="countdown">-- дн -- ч -- м -- с</div>
        <div class="qr-hint">📱 Сохрани страницу или отсканируй QR-код снова</div>
    </div>

    <script>
        const eventDate = new Date("June 15, 2026 18:00:00 GMT+0300").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = eventDate - now;
            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "🎉 Уже наступило! 🎉";
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = `${days}д ${hours}ч ${minutes}м ${seconds}с`;
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);
        
        const img = document.getElementById('eventPhoto');
        const placeholder = document.getElementById('photoPlaceholder');
        if (img.complete && img.naturalHeight !== 0) {
            img.style.display = 'block';
            placeholder.style.display = 'none';
        } else if (img) {
            img.onload = function() {
                img.style.display = 'block';
                placeholder.style.display = 'none';
            };
        }
    </script>
</body>
</html>
