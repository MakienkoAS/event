<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Открытка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0C0C0C;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Сетка — 2 колонки */
        .grid {
            max-width: 500px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Базовый стиль для всех блоков */
        .item {
            background: white;
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Квадраты (по умолчанию) — квадрат через aspect-ratio */
        .square {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Прямоугольник на всю ширину (2 колонки) */
        .full-width {
            grid-column: span 2;
        }

        /* Пример оформления (настройте под себя) */
        .item h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #333;
        }

        .item p {
            font-size: 0.85rem;
            color: #666;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        /* Разные фоны для наглядности (уберите или замените) */
        .item:nth-child(1) { background: #ffe8e8; }
        .item:nth-child(2) { background: #e8f0ff; }
        .item:nth-child(3) { background: #e8ffe8; }
        .item:nth-child(4) { background: #fff0e8; }
        .item:nth-child(5) { background: #f0e8ff; }
    </style>
</head>
<body>
    <div class="grid">
        
        <!-- Квадрат 1 -->
        <div class="item square">
            <div class="icon">📅</div>
            <h3>Дата</h3>
            <p>15 июня 2026</p>
        </div>
        
        <!-- Квадрат 2 -->
        <div class="item square">
            <div class="icon">⏰</div>
            <h3>Время</h3>
            <p>18:00</p>
        </div>
        
        <!-- Прямоугольник на всю ширину -->
        <div class="item full-width">
            <div class="icon">📍</div>
            <h3>Место</h3>
            <p>Ресторан Рётэй, Японский сад, парк Галицкого</p>
        </div>
        
        <!-- Квадрат 3 -->
        <div class="item square">
            <div class="icon">🍣</div>
            <h3>Дресс-код</h3>
            <p>Smart casual</p>
        </div>
        
        <!-- Квадрат 4 -->
        <div class="item square">
            <div class="icon">🎁</div>
            <h3>Сюрприз</h3>
            <p>Будет!</p>
        </div>
        
        <!-- Ещё один прямоугольник (опционально) -->
        <div class="item full-width">
            <div class="icon">💝</div>
            <h3>От меня</h3>
            <p>Твой подарок — этот вечер. Жду тебя!</p>
        </div>
        
    </div>
</body>
</html>
