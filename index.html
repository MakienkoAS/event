<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Открытка</title>
    <style>
		
		/* Сброс стандартных отступов */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			-webkit-text-size-adjust: 100%;
		}
		
		/* Настройки фона */
		body {
			background: #161616;
			font-family: system-ui, -apple-system, sans-serif;
			padding: 0px;
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}
		
		/* Сетка */
		.grid {
			max-width: 500px;
			width: 100%;
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 0px;
		}
		
		/* Стиль для всех блоков */
		.item {
			position: relative;
			background: white;
		}
		
		/* Квадрат */
		.square {
			aspect-ratio: 1 / 1;
			border-radius: 20%;
			container-type: inline-size;
			container-name: square;
		}
		
		/* Прямоугольник */
		.full-width {
			grid-column: span 2;
			aspect-ratio: 2 / 1;
			border-radius: 10%/20%;
			container-type: inline-size;
			container-name: wide;
		}
		
		.abs {
			position: absolute;
		}
		
		/* Оформление текста внутри квадратов */
		@container square (min-width: 0px) {
			.item h3 {
				font-size: 20cqw;
				font-weight: 500;
				line-height: 1;
			}
			
			.item p {
				font-size: 8cqw;
				font-weight: 500;
				line-height: 1;
			}
		}
		
		/* Оформление текста внутри прямоугольников */
		@container wide (min-width: 0px) {
			.item h3 {
				font-size: 10cqw;
				font-weight: 500;
				line-height: 1;
			}
			
			.item p {
				font-size: 4cqw;
				font-weight: 500;
				line-height: 1;
			}
		}
		
		/* Картинка внутри квадрата */
		.image-square {
			width: 100%;
			height: 100%;
			object-fit: cover;
			border-radius: 20%;
			display: block;
		}
		
		/* Картинка внутри пустого прямоугольника */
		.image-full {
			width: 100%;
			height: 100%;
			object-fit: cover;
			border-radius: 10%/20%;
			display: block;
		}
		
		/* Цвета блоков */
		.block-1 {
			background: #FFFFFF;
		}
		
		.block-1 h3,
		.block-1 p {
			color: #000000;
		}
		
		.block-2 {
			background: #800B0E;
		}
		
		.block-2 h3,
		.block-2 p {
			color: #FFFFFF;
		}
		
		.block-3{
			background: #FFFFFF;
		}
		
		.block-3 h3,
		.block-3 p {
			color: #000000;
		}
		
		/* Блок музыки */
		.music-widget {
			background: #2a2a2a;
			position: relative;
			border-radius: 10%/20%;
			overflow: hidden;
		}
		
		/* Контейнер кнопки внутри сетки */
        .button-container {
            grid-column: span 2;
            margin-top: 0;
            width: 100%;
        }
		
		/* Кнопка */
        .calendar-btn {
            display: block;
            width: 100%;
			aspect-ratio: 5 / 1;
            background: #FFFFFF;
            color: black;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 5cqw;
			font-weight: 500;
            border: none;
            border-radius: 10%/50%;
            cursor: pointer;
        }
        
        .calendar-btn:hover {
            background: #a00f13;
        }
		
    </style>
</head>
<body>
    <div class="grid">
		
		<div class="button-container">
            <button class="calendar-btn" id="addToCalendarBtn">
                Добавить в календарь
            </button>
        </div>
		
	</div>
	
<script>

    document.getElementById('addToCalendarBtn').addEventListener('click', function() {
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('Привет')}&details=${encodeURIComponent('А ты красотка')}&dates=20260610T180000/20260610T210000&location=${encodeURIComponent('Краснодар')}`;
        window.open(url, '_blank');
    });
	
</script>
</body>
</html>
