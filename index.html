<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Открытка</title>
    <style>
		
		/* Сброс стандартных отступов */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		/* Настройки фона */
		body {
			background: #161616;     /* Цвет */
			font-family: system-ui, -apple-system, sans-serif;
			padding: 0px;     /* Внутернние отступы от краев экрана */
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}
		
		/* Сетка */
		.grid {
			max-width: 500px;
			width: 100%;
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 0px;     /* Расстояние между блоками */
		}
		
		/* Стиль для всех блоков */
		.item {
			position: relative;
			background: white;
			border-radius: 50px;     /* Скругление краев */
		}
		
		/* Квадрат */
		.square {
			aspect-ratio: 1 / 1;
		}
		
		/* Прямоугольник */
		.full-width {
			grid-column: span 2;
			aspect-ratio: 2 / 1;
		}
		
		.custom-block {
			position: relative;
		}
		
		.abs {
			position: absolute;
		}
		
		/* Оформление текста внутри блоков */
		.item h3 {
			font-size: 3.2rem;     /* Размер шрифта */
			line-height: 1;
			color: #333;
		}
		
		.item p {
			font-size: 1.3rem;
			line-height: 1;
			color: #666;
		}
		
		.icon {
			font-size: 2rem;
		}
		
		/* Настройка текста */
		.item .text-1 {
			color: #FFFFFF;
		}
		
		.item .text-2 {
			color:#000000;
		}
		
		.item .text-3 {
			color: #000000;
		}
		
		/* Цвета блоков */
		.block-1 {
			background: #800B0E;
		}
		
		.block-2 {
			background: #ff6b6b;
		}
		
		.block-3{
			background: #ff6b6b;
		}
		
    </style>
</head>
<body>
    <div class="grid">
		
		<div class="item square block-1">
			<h3 class="abs text-1" style="left: 25px; top: 25px;">10 MAY</h3>
			<p class="abs text-1" style="left: 25px; top: 180px;">15 июня 2026</p>
		</div>
		
		<div class="item square">
			<h3 class="abs" style="left: 25px; top: 25px;">ВРЕМЯ</h3>
			<p class="abs" style="left: 25px; top: 100px;">Приглашение <br> на свидание</p>
		</div>
		
		<div class="item full-width">
			<div>
				<h3 class="abs" style="left: 25px; top: 25px;">МАСТЕР-КЛАСС</h3>
				<p class="abs" style="left: 25px; top: 85px;">По свечеварению для двоих</p>
			</div>
			<div>
				<p class="abs" style="left: 200px; top: 180px;">Парк Галицкого</p>
			</div>
		</div>
		
	</div>
</body>
</html>
